site_name: StackD
site_description: Self-hostable Terraform/OpenTofu orchestration — plan → human approval → apply.
repo_url: https://github.com/fmiquel90/stackd
repo_name: fmiquel90/stackd
edit_uri: edit/main/docs/

extra_css:
  - assets/brand.css

theme:
  name: material
  logo: assets/logo-mark-white.svg
  favicon: assets/logo-mark.svg
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Guide:
      - Getting started: guide/getting-started.md
      - Stacks & environments: guide/stacks-and-environments.md
      - Variables & secrets: guide/variables.md
      - External secret sources: guide/external-secrets.md
      - Runs & approvals: guide/runs-and-approvals.md
      - Running commands: guide/commands.md
      - Hooks & .stackd.yml: guide/hooks.md
      - Dependencies & mocks: guide/dependencies-and-mocks.md
      - Importing an existing stack: guide/importing-existing-state.md
      - Exit & data portability: guide/leaving.md
      - Cloud credentials (OIDC): guide/cloud-credentials.md
      - Workers & scaling: guide/workers-and-scaling.md
      - Notifications: guide/notifications.md
      - Observability: guide/observability.md
  - Concepts: CONCEPTS.md
  - API: api.md
  - Reference:
      - Specification: SPECS.md
      - Plan & scope: PLAN.md
      - Design: DESIGN.md
      - Dev environment: DEV.md
      - Testing: TESTING.md
