name: e2e

# The full live scenario builds images and runs a real worker executing OpenTofu (~minutes), so it
# runs on main and on demand rather than on every PR. Trigger manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COMPOSE: docker compose -f deploy/docker-compose.dev.yml
    steps:
      - uses: actions/checkout@v6

      - name: Generate .env + dev keys
        run: bash scripts/bootstrap-env.sh

      # Only the services e2e needs: Postgres + API + worker (demo envs use local state, so no
      # Garage; no front). Builds the api/worker images.
      - name: Bring up the stack
        run: $COMPOSE up -d --wait postgres api worker

      - name: Migrate
        run: $COMPOSE exec -T api uv run alembic upgrade head

      - name: Seed fixture repos (host git)
        run: bash scripts/seed-fixtures.sh

      - name: Seed demo graph + worker pool token
        run: $COMPOSE exec -T api uv run python -m app.seed

      - name: Run the e2e scenario
        run: $COMPOSE exec -T api uv run pytest e2e -v

      - name: Dump logs on failure
        if: failure()
        run: $COMPOSE logs --no-color

      - name: Tear down
        if: always()
        run: $COMPOSE down -v
