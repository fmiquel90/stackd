name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. successive pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0 # v8+ no longer publishes floating major tags; pin full version
        with:
          enable-cache: true
      # Runs the generic hooks + ruff/ruff-format (ruff via each project's uv env, as configured).
      - run: uvx pre-commit run --all-files --show-diff-on-failure --color=always

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      # testcontainers spins up Postgres 18 via the runner's Docker; Ryuk is unnecessary in CI.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0 # v8+ no longer publishes floating major tags; pin full version
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock
      - run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Tests (pytest on real Postgres 18 via testcontainers)
        run: uv run pytest -q

  # mypy is strict (CLAUDE §5) but the codebase is not yet clean — advisory until the existing
  # errors are cleared, then drop `continue-on-error` to make it a required gate.
  api-typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0 # v8+ no longer publishes floating major tags; pin full version
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock
      - run: uv sync --frozen
      - run: uv run mypy app

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0 # v8+ no longer publishes floating major tags; pin full version
        with:
          enable-cache: true
          cache-dependency-glob: worker/uv.lock
      - run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Tests (pytest)
        run: uv run pytest -q

  front:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: front/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Typecheck (tsc)
        run: pnpm run typecheck
      - name: Unit tests (vitest)
        run: pnpm exec vitest run --passWithNoTests
      - name: Build
        run: pnpm build
