version: '3'
dotenv: ['.env']

vars:
  COMPOSE: docker compose -f deploy/docker-compose.dev.yml

tasks:
  default:
    cmds: [task --list]
    silent: true

  env:
    desc: Generate .env and dev keys on first launch
    cmds: [bash scripts/bootstrap-env.sh]
    status: [test -f .env]

  dev:
    desc: Full local stack (compose + migrations + seed)
    deps: [env]
    cmds:
      - "{{.COMPOSE}} up -d --wait"
      - task: migrate
      - task: seed-fixtures
      - task: seed

  dev-git:
    desc: Dev stack + Gitea (real webhooks)
    deps: [env]
    cmds:
      - "{{.COMPOSE}} --profile git up -d --wait"
      - task: migrate
      - task: seed

  dev-aws:
    desc: Dev stack + LocalStack
    deps: [env]
    cmds:
      - "{{.COMPOSE}} --profile aws up -d --wait"
      - task: migrate
      - task: seed

  front-install:
    desc: Install front-end dependencies (idempotent)
    dir: front
    cmds: [pnpm install]
    status: [test -d node_modules]

  front:
    desc: Front-end dev server (Vite — http://localhost:5173, proxies /api + ws to :8000)
    deps: [front-install]
    dir: front
    cmds: [pnpm dev]

  up:
    desc: Full stack incl. the front (backend detached, Vite in the foreground)
    deps: [dev]
    cmds:
      - task: front

  migrate:
    desc: Apply Alembic migrations
    cmds: ["{{.COMPOSE}} exec -T api uv run alembic upgrade head"]

  makemigration:
    desc: Autogenerate an Alembic migration (pass NAME=...)
    cmds: ['{{.COMPOSE}} exec -T api uv run alembic revision --autogenerate -m "{{.NAME}}"']

  seed-fixtures:
    desc: Create the demo fixture git repos in .dev/repos (host git, idempotent)
    cmds: [bash scripts/seed-fixtures.sh]

  seed:
    desc: Demo data (idempotent — spaces, stacks, envs, deps, worker pool token)
    cmds: ["{{.COMPOSE}} exec -T api uv run python -m app.seed"]

  reset:
    desc: Tear everything down and start fresh
    cmds:
      - "{{.COMPOSE}} down -v"
      - task: dev

  test:
    desc: pytest + vitest
    cmds:
      - "{{.COMPOSE}} exec -T api uv run pytest"
      - cmd: "cd front && pnpm test --run"
        ignore_error: true

  push-change:
    desc: Simulate a merge in demo-network (staleness test)
    dir: .dev/repos/demo-network
    cmds:
      - date >> CHANGELOG.txt
      # Quote the whole command: the ": " in the commit message is a YAML mapping token otherwise.
      - 'git add -A && git commit -m "feat: simulated merge"'

  e2e:
    desc: Full non-regression scenario against the live stack + real worker (DEV §7)
    deps: [dev]
    cmds: ["{{.COMPOSE}} exec -T api uv run pytest e2e -v"]

  logs:
    desc: Aggregated colored logs (api, worker)
    cmds: ["{{.COMPOSE}} logs -f api worker"]

  psql:
    desc: Postgres shell
    cmds: ["{{.COMPOSE}} exec postgres psql -U stackd stackd"]

  docs:
    desc: Serve the user documentation locally (http://localhost:8001)
    cmds: ["uv run mkdocs serve -a localhost:8001"]

  docs-build:
    desc: Build the static documentation site into ./site
    cmds: ["uv run mkdocs build"]

  build-runner-images:
    desc: Build the OpenTofu + Terraform runner images (host arch, loaded locally)
    cmds:
      - docker build -f deploy/images/opentofu.Dockerfile -t stackd/opentofu:1.12.0 .
      - docker build -f deploy/images/terraform.Dockerfile -t stackd/terraform:1.9.8 .

  lint:
    desc: ruff + mypy
    cmds:
      - "{{.COMPOSE}} exec -T api uv run ruff check ."
      - "{{.COMPOSE}} exec -T api uv run ruff format --check ."
