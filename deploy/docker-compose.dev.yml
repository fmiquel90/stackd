name: stackd-dev

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: stackd
      POSTGRES_PASSWORD: stackd
      POSTGRES_DB: stackd
    ports: ["5432:5432"]
    # PG18 places data in a subdirectory of this mount (docker-library/postgres#37).
    volumes: ["pgdata:/var/lib/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stackd -d stackd"]
      interval: 3s
      timeout: 3s
      retries: 20

  garage:
    image: dxflrs/garage:v1.0.1
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    ports:
      - "3900:3900"  # S3 API
      - "3903:3903"  # admin

  api:
    build:
      context: ../api
      dockerfile: Dockerfile.dev
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://stackd:stackd@postgres:5432/stackd
      S3_ENDPOINT_URL: http://garage:3900
      STACKD_INTERNAL_URL: http://api:8000  # workers reach the state backend here, not localhost
    volumes:
      - ../api:/app
      - ../.dev:/stackd-dev  # shared with the worker: seed writes the pool token + fixture repos here
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/healthz\")'"]
      interval: 3s
      timeout: 3s
      retries: 30

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile.dev
    env_file: ../.env
    environment:
      STACKD_API_URL: http://api:8000
      STACKD_RUNNER: local
      # Pool token is generated by the seed and written into the shared .dev mount; the agent
      # waits for it to appear, then registers (so worker boot order vs. seed doesn't matter).
      STACKD_POOL_TOKEN_FILE: /stackd-dev/pool.token
    volumes:
      - ../worker:/app
      - ../.dev:/stackd-dev  # fixture repos (file:///stackd-dev/repos/*) + pool token
    depends_on:
      api:
        condition: service_healthy

  front:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ../front:/app
    ports: ["5173:5173"]
    depends_on:
      api:
        condition: service_healthy

  # --- optional profiles ---
  gitea:
    image: gitea/gitea:1.22
    profiles: ["git"]
    environment:
      GITEA__security__INSTALL_LOCK: "true"
    ports: ["3000:3000"]
    volumes: ["gitea_data:/data"]

  localstack:
    image: localstack/localstack:3
    profiles: ["aws"]
    environment:
      SERVICES: s3,sts,iam
    ports: ["4566:4566"]

volumes:
  pgdata:
  garage_meta:
  garage_data:
  gitea_data:
